{{template "header" .}}
<h1>{{.Title}}</h1>
{{if .Error}}<div class="error-box">{{.Error}}</div>{{end}}
<form class="entry-form card" method="post" action="{{.Action}}">
  <div class="row">
    <label class="field">project
      <select name="project" required>
        {{range .Projects}}<option value="{{.Path}}" {{if eq .Path $.Project}}selected{{end}}>{{if .ParentName}}&nbsp;&nbsp;&nbsp;{{end}}{{.Name}}</option>{{end}}
      </select>
    </label>
    <label class="field">kind
      <select name="kind">
        <option value="logged" {{if eq .Kind "logged"}}selected{{end}}>logged (work done)</option>
        <option value="planned" {{if eq .Kind "planned"}}selected{{end}}>planned (future allocation)</option>
      </select>
    </label>
  </div>
  <label class="field">subject
    <input name="subject" value="{{.Subject}}" required placeholder="what did you work on?">
  </label>
  <div class="row">
    <label class="field">date
      <input type="date" name="date" value="{{.Date}}" required>
    </label>
    <label class="field">start
      <input type="time" name="start" value="{{.Start}}" step="1800" required>
    </label>
    <label class="field">duration
      <input id="duration-input" name="duration" value="{{.Duration}}" list="durations" required placeholder="1.5h">
      <datalist id="durations">
        <option value="30m"><option value="1h"><option value="1.5h"><option value="2h">
        <option value="3h"><option value="4h"><option value="6h"><option value="8h">
      </datalist>
    </label>
  </div>
  <div class="row duration-presets">
    <button type="button" class="quiet" onclick="document.getElementById('duration-input').value = '30m'">30m</button>
    <button type="button" class="quiet" onclick="document.getElementById('duration-input').value = '1h'">1h</button>
    <button type="button" class="quiet" onclick="document.getElementById('duration-input').value = '3h'">3h</button>
    <button type="button" class="quiet" onclick="document.getElementById('duration-input').value = '8h'">8h</button>
  </div>
  {{if .AllowSpan}}
  <div class="row">
    <label class="field">repeat until (optional)
      <input type="date" name="end" value="{{.End}}" min="{{.Date}}"
             title="fills in one entry per day from date to here, e.g. for a holiday or trip">
    </label>
    <label class="field checkbox-field">
      <input type="checkbox" name="weekdays_only" value="1" {{if .WeekdaysOnly}}checked{{end}}>
      weekdays only
    </label>
  </div>
  {{end}}
  <label class="field">tags
    <input name="tags" value="{{.Tags}}" placeholder="#research #implementation">
  </label>
  <label class="field">notes
    <textarea name="notes" rows="4" placeholder="optional">{{.Notes}}</textarea>
  </label>
  <div class="row">
    <button class="primary">Save</button>
    <a href="/entries" style="align-self: center;">cancel</a>
  </div>
</form>
{{template "footer"}}
